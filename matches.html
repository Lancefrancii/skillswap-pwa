<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2563eb" />
    <title>SkillSwap PH — Matches</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="style.css" rel="stylesheet" />
    <script src="global.js"></script>
    <style>
        * {
            font-family: 'Plus Jakarta Sans', sans-serif;
            box-sizing: border-box;
        }

        :root {
            --blue: #2563eb;
            --blue-dark: #1d4ed8;
            --blue-light: #eff6ff;
            --blue-mid: #dbeafe;
            --green: #10b981;
            --green-light: #dcfce7;
            --yellow: #f59e0b;
            --yellow-light: #fef9c3;
            --red: #ef4444;
            --red-light: #fee2e2;
            --text: #0f172a;
            --text-mid: #475569;
            --text-light: #94a3b8;
            --border: #e2e8f0;
            --bg: #f1f5f9;
            --white: #ffffff;
            --nav-h: 64px;
            --sidebar-w: 240px;
        }

        html,
        body {
            height: 100%;
            margin: 0;
            background: var(--bg);
            color: var(--text);
        }

        ::-webkit-scrollbar {
            width: 5px;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        .topnav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            height: var(--nav-h);
            background: var(--white);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 16px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 200px;
        }

        .brand-logo {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: var(--blue);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .brand-name {
            font-size: 1rem;
            font-weight: 800;
            color: var(--text);
        }

        .nav-actions {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .nav-btn {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            border: 1.5px solid var(--border);
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-mid);
            transition: all 0.2s;
        }

        .nav-btn:hover {
            border-color: var(--blue);
            background: var(--blue-light);
            color: var(--blue);
        }

        .avatar-btn {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            background: var(--blue);
            color: white;
            font-size: 0.8rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .hamburger {
            display: none;
        }

        .layout {
            display: flex;
            margin-top: var(--nav-h);
            min-height: calc(100vh - var(--nav-h));
        }

        .sidebar {
            width: var(--sidebar-w);
            background: white;
            border-right: 1px solid var(--border);
            position: fixed;
            top: var(--nav-h);
            left: 0;
            height: calc(100vh - var(--nav-h));
            overflow-y: auto;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            z-index: 50;
            transition: transform 0.3s ease;
        }

        .sidebar.hidden {
            transform: translateX(-100%);
        }

        .sidebar-label {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-light);
            padding: 16px 10px 6px;
        }

        .sidebar-label:first-child {
            padding-top: 0;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 12px;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-mid);
            cursor: pointer;
            text-decoration: none;
            transition: all 0.15s;
        }

        .nav-link:hover {
            background: var(--bg);
            color: var(--text);
        }

        .nav-link.active {
            background: var(--blue-light);
            color: var(--blue);
            font-weight: 700;
        }

        .nav-link svg {
            flex-shrink: 0;
        }

        .logout-btn {
            margin-top: auto;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }

        .btn-logout {
            width: 100%;
            padding: 9px;
            border-radius: 10px;
            border: 1.5px solid var(--red-light);
            background: var(--red-light);
            color: var(--red);
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            transition: all 0.2s;
        }

        .btn-logout:hover {
            background: var(--red);
            color: white;
        }

        .main {
            margin-left: var(--sidebar-w);
            flex: 1;
            padding: 28px 24px;
        }

        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .page-title {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--text);
        }

        .page-sub {
            font-size: 0.85rem;
            color: var(--text-mid);
            margin-top: 3px;
        }

        .filter-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .filter-select {
            padding: 8px 14px;
            border: 1.5px solid var(--border);
            border-radius: 12px;
            font-size: 0.8rem;
            background: white;
            color: var(--text-mid);
            cursor: pointer;
        }

        .filter-select:focus {
            border-color: var(--blue);
            outline: none;
        }

        .match-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }

        .match-card {
            background: white;
            border-radius: 16px;
            border: 1.5px solid var(--border);
            padding: 20px;
            transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
            animation: fadeUp 0.4s ease both;
            cursor: pointer;
        }

        .match-card:hover {
            border-color: var(--blue);
            box-shadow: 0 4px 20px rgba(37, 99, 235, 0.1);
            transform: translateY(-2px);
        }

        .match-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 14px;
        }

        .match-avatar {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            background: linear-gradient(135deg, #2563eb, #3b82f6);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .match-info {
            flex: 1;
        }

        .match-name {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text);
        }

        .match-rating {
            font-size: 0.75rem;
            color: #fbbf24;
            margin-top: 4px;
        }

        .match-score {
            background: var(--green-light);
            color: var(--green);
            font-size: 0.75rem;
            font-weight: 700;
            padding: 4px 8px;
            border-radius: 20px;
        }

        .match-details {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .detail-chip {
            font-size: 0.7rem;
            padding: 3px 8px;
            border-radius: 20px;
            background: var(--bg);
            color: var(--text-mid);
        }

        .skill-section {
            margin-bottom: 12px;
        }

        .skill-label {
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--text-light);
            margin-bottom: 6px;
        }

        .skill-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .skill-tag {
            font-size: 0.7rem;
            font-weight: 600;
            padding: 3px 9px;
            border-radius: 20px;
        }

        .tag-offer {
            background: var(--green-light);
            color: #16a34a;
        }

        .tag-need {
            background: var(--yellow-light);
            color: #a16207;
        }

        .btn-connect {
            width: 100%;
            margin-top: 12px;
            padding: 10px;
            border-radius: 10px;
            border: 1.5px solid var(--blue);
            background: white;
            color: var(--blue);
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-connect:hover {
            background: var(--blue);
            color: white;
        }

        .btn-connect.sent {
            background: var(--blue);
            color: white;
            cursor: default;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 1024px) {
            .match-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .main {
                margin-left: 0;
                padding: 16px;
            }

            .hamburger {
                display: flex;
            }

            .brand {
                min-width: unset;
            }

            .match-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <div id="toast"></div>
    <div id="navOverlay" onclick="toggleSidebar()"></div>

    <nav class="topnav">
        <button class="hamburger nav-btn" onclick="toggleSidebar()" aria-label="Menu">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5">
                <line x1="2" y1="5" x2="16" y2="5" />
                <line x1="2" y1="9" x2="16" y2="9" />
                <line x1="2" y1="13" x2="16" y2="13" />
            </svg>
        </button>
        <div class="brand">
            <div class="brand-logo"><svg width="20" height="20" viewBox="0 0 28 28" fill="none">
                    <path d="M7 9l7-5 7 5v10l-7 5-7-5V9z" fill="white" opacity="0.9" />
                </svg></div>
            <span class="brand-name">SkillSwap PH</span>
        </div>
        <div class="nav-actions">
            <a href="dashboard.html" class="nav-btn"><svg width="17" height="17" fill="none" stroke="currentColor"
                    stroke-width="2" viewBox="0 0 24 24">
                    <rect x="3" y="3" width="7" height="7" />
                    <rect x="14" y="3" width="7" height="7" />
                    <rect x="14" y="14" width="7" height="7" />
                    <rect x="3" y="14" width="7" height="7" />
                </svg></a>
            <div class="nav-btn" onclick="SkillSwap.showToast('🔔 No new notifications')"><svg width="17" height="17"
                    fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
                    <path d="M13.73 21a2 2 0 0 1-3.46 0" />
                </svg></div>
            <div class="avatar-btn" id="userAvatar">JD</div>
        </div>
    </nav>

    <div class="layout">
        <aside class="sidebar" id="sidebar">
            <p class="sidebar-label">Navigation</p>
            <a href="dashboard.html" class="nav-link"><svg width="16" height="16" fill="none" stroke="currentColor"
                    stroke-width="2" viewBox="0 0 24 24">
                    <rect x="3" y="3" width="7" height="7" />
                    <rect x="14" y="3" width="7" height="7" />
                    <rect x="14" y="14" width="7" height="7" />
                    <rect x="3" y="14" width="7" height="7" />
                </svg>Dashboard</a>
            <a href="skills.html" class="nav-link"><svg width="16" height="16" fill="none" stroke="currentColor"
                    stroke-width="2" viewBox="0 0 24 24">
                    <path
                        d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" />
                </svg>My Skills</a>
            <a href="matches.html" class="nav-link active"><svg width="16" height="16" fill="none" stroke="currentColor"
                    stroke-width="2" viewBox="0 0 24 24">
                    <circle cx="9" cy="7" r="4" />
                    <path d="M3 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2" />
                    <path d="M16 3.13a4 4 0 0 1 0 7.75" />
                    <path d="M21 21v-2a4 4 0 0 0-3-3.85" />
                </svg>Matches</a>
            <a href="exchanges.html" class="nav-link"><svg width="16" height="16" fill="none" stroke="currentColor"
                    stroke-width="2" viewBox="0 0 24 24">
                    <path
                        d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3" />
                </svg>Exchanges</a>
            <a href="messages.html" class="nav-link"><svg width="16" height="16" fill="none" stroke="currentColor"
                    stroke-width="2" viewBox="0 0 24 24">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
                </svg>Messages</a>
            <a href="profile.html" class="nav-link"><svg width="16" height="16" fill="none" stroke="currentColor"
                    stroke-width="2" viewBox="0 0 24 24">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                    <circle cx="12" cy="7" r="4" />
                </svg>Profile</a>
            <div class="logout-btn"><button class="btn-logout" onclick="SkillSwap.logout()"><svg width="14" height="14"
                        fill="none" stroke="currentColor" stroke-width="2.5">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                        <polyline points="16 17 21 12 16 7" />
                        <line x1="21" y1="12" x2="9" y2="12" />
                    </svg>Log Out</button></div>
        </aside>

        <main class="main">
            <div class="page-header">
                <div>
                    <h1 class="page-title">🤝 AI Skill Matches</h1>
                    <p class="page-sub">People matched with your skills based on ML recommendations</p>
                </div>
                <button onclick="SkillSwap.showToast('🔄 Refreshing matches...')"
                    style="padding:8px 16px;border-radius:10px;border:1.5px solid var(--blue);background:white;color:var(--blue);font-weight:600;cursor:pointer;">⟳
                    Refresh</button>
            </div>

            <div class="filter-bar">
                <select class="filter-select" id="filterLocation" onchange="applyFilters()">
                    <option value="">All Locations</option>
                    <option value="Online">Online</option>
                    <option value="NCR">NCR</option>
                    <option value="Cebu">Cebu</option>
                    <option value="Davao">Davao</option>
                </select>
                <select class="filter-select" id="filterAvailability" onchange="applyFilters()">
                    <option value="">Any Time</option>
                    <option value="Weekdays">Weekdays</option>
                    <option value="Weekends">Weekends</option>
                    <option value="Flexible">Flexible</option>
                </select>
            </div>

            <div class="match-grid" id="matchesGrid"></div>
        </main>
    </div>

    <script>
        let allMatches = [...SkillSwap.matches];
        let sentRequests = JSON.parse(localStorage.getItem('sentRequests') || '{}');

        function renderMatches() {
            const location = document.getElementById('filterLocation')?.value || '';
            const availability = document.getElementById('filterAvailability')?.value || '';

            let filtered = allMatches.filter(m => {
                if (location && m.location !== location) return false;
                if (availability && m.availability !== availability) return false;
                return true;
            });

            const grid = document.getElementById('matchesGrid');
            if (!filtered.length) {
                grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--text-light);">🔍 No matches found. Try adjusting filters.</div>';
                return;
            }

            grid.innerHTML = filtered.map((m, i) => `
      <div class="match-card" style="animation-delay:${i * 0.05}s">
        <div class="match-header">
          <div class="match-avatar">${m.initials}</div>
          <div class="match-info"><div class="match-name">${m.name}</div><div class="match-rating">${'★'.repeat(Math.floor(m.rating))}${'☆'.repeat(5 - Math.floor(m.rating))} (${m.rating})</div></div>
          <div class="match-score">${m.match_score}% Match</div>
        </div>
        <div class="match-details"><span class="detail-chip">📍 ${m.location}</span><span class="detail-chip">⏰ ${m.availability}</span></div>
        <div class="skill-section"><div class="skill-label">Offers</div><div class="skill-tags">${m.offers.map(o => `<span class="skill-tag tag-offer">${o}</span>`).join('')}</div></div>
        <div class="skill-section"><div class="skill-label">Needs</div><div class="skill-tags">${m.needs.map(n => `<span class="skill-tag tag-need">${n}</span>`).join('')}</div></div>
        <button class="btn-connect ${sentRequests[m.id] ? 'sent' : ''}" id="connect-${m.id}" onclick="handleConnect(${m.id}, '${m.name}', this)">${sentRequests[m.id] ? '✓ Sent' : 'Connect'}</button>
      </div>
    `).join('');
        }

        function handleConnect(userId, userName, btn) {
            if (sentRequests[userId]) return;
            btn.textContent = '...';
            btn.disabled = true;
            setTimeout(() => {
                sentRequests[userId] = true;
                localStorage.setItem('sentRequests', JSON.stringify(sentRequests));
                btn.textContent = '✓ Sent';
                btn.classList.add('sent');
                SkillSwap.showToast(`✅ Exchange request sent to ${userName}!`);
                const badge = document.getElementById('notifBadge');
                if (badge) badge.textContent = parseInt(badge.textContent) + 1;
            }, 500);
        }

        function applyFilters() { renderMatches(); }
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('navOverlay').classList.toggle('show'); }

        document.addEventListener('DOMContentLoaded', () => {
            if (!localStorage.getItem('jwt_token')) { window.location.href = 'index.html'; return; }
            renderMatches();
        });
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('service-worker.js');
    </script>
</body>

</html>
