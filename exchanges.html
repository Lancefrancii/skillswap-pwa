<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2563eb" />
    <title>SkillSwap PH — Exchanges</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="style.css" rel="stylesheet" />
    <script src="global.js"></script>
    <style>
        * {
            font-family: 'Plus Jakarta Sans', sans-serif;
            box-sizing: border-box;
        }

        :root {
            --blue: #2563eb;
            --blue-light: #eff6ff;
            --blue-mid: #dbeafe;
            --green: #10b981;
            --green-light: #dcfce7;
            --yellow: #f59e0b;
            --yellow-light: #fef9c3;
            --red: #ef4444;
            --red-light: #fee2e2;
            --text: #0f172a;
            --text-mid: #475569;
            --text-light: #94a3b8;
            --border: #e2e8f0;
            --bg: #f1f5f9;
            --white: #ffffff;
            --nav-h: 64px;
            --sidebar-w: 240px;
        }

        html,
        body {
            height: 100%;
            margin: 0;
            background: var(--bg);
            color: var(--text);
        }

        ::-webkit-scrollbar {
            width: 5px;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        .topnav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            height: var(--nav-h);
            background: var(--white);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 16px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 200px;
        }

        .brand-logo {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: var(--blue);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .brand-name {
            font-size: 1rem;
            font-weight: 800;
            color: var(--text);
        }

        .nav-actions {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .nav-btn {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            border: 1.5px solid var(--border);
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-mid);
            transition: all 0.2s;
        }

        .nav-btn:hover {
            border-color: var(--blue);
            background: var(--blue-light);
            color: var(--blue);
        }

        .avatar-btn {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            background: var(--blue);
            color: white;
            font-size: 0.8rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .hamburger {
            display: none;
        }

        .layout {
            display: flex;
            margin-top: var(--nav-h);
            min-height: calc(100vh - var(--nav-h));
        }

        .sidebar {
            width: var(--sidebar-w);
            background: white;
            border-right: 1px solid var(--border);
            position: fixed;
            top: var(--nav-h);
            left: 0;
            height: calc(100vh - var(--nav-h));
            overflow-y: auto;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            z-index: 50;
            transition: transform 0.3s ease;
        }

        .sidebar.hidden {
            transform: translateX(-100%);
        }

        .sidebar-label {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-light);
            padding: 16px 10px 6px;
        }

        .sidebar-label:first-child {
            padding-top: 0;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 12px;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-mid);
            cursor: pointer;
            text-decoration: none;
            transition: all 0.15s;
        }

        .nav-link:hover {
            background: var(--bg);
            color: var(--text);
        }

        .nav-link.active {
            background: var(--blue-light);
            color: var(--blue);
            font-weight: 700;
        }

        .nav-link svg {
            flex-shrink: 0;
        }

        .logout-btn {
            margin-top: auto;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }

        .btn-logout {
            width: 100%;
            padding: 9px;
            border-radius: 10px;
            border: 1.5px solid var(--red-light);
            background: var(--red-light);
            color: var(--red);
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            transition: all 0.2s;
        }

        .btn-logout:hover {
            background: var(--red);
            color: white;
        }

        .main {
            margin-left: var(--sidebar-w);
            flex: 1;
            padding: 28px 24px;
        }

        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .page-title {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--text);
        }

        .page-sub {
            font-size: 0.85rem;
            color: var(--text-mid);
            margin-top: 3px;
        }

        .exchanges-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .exchange-card {
            background: white;
            border-radius: 16px;
            border: 1.5px solid var(--border);
            padding: 18px 20px;
            transition: all 0.2s;
            animation: fadeUp 0.3s ease both;
        }

        .exchange-card:hover {
            border-color: var(--blue);
            box-shadow: 0 4px 16px rgba(37, 99, 235, 0.08);
        }

        .exchange-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }

        .exchange-avatar {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            background: linear-gradient(135deg, #2563eb, #3b82f6);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 1rem;
            flex-shrink: 0;
        }

        .exchange-info {
            flex: 1;
        }

        .exchange-name {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text);
        }

        .exchange-skill {
            font-size: 0.8rem;
            color: var(--text-mid);
            margin-top: 2px;
        }

        .exchange-date {
            font-size: 0.7rem;
            color: var(--text-light);
            margin-top: 4px;
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 700;
        }

        .status-pending {
            background: var(--yellow-light);
            color: #a16207;
        }

        .status-accepted {
            background: var(--green-light);
            color: #16a34a;
        }

        .status-completed {
            background: var(--blue-mid);
            color: var(--blue);
        }

        .mode-badge {
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.65rem;
            font-weight: 600;
            background: var(--bg);
            color: var(--text-mid);
        }

        .exchange-actions {
            margin-top: 14px;
            display: flex;
            gap: 10px;
        }

        .btn-accept {
            padding: 8px 20px;
            border-radius: 10px;
            border: none;
            background: var(--green-light);
            color: #16a34a;
            font-weight: 700;
            cursor: pointer;
        }

        .btn-accept:hover {
            background: var(--green);
            color: white;
        }

        .btn-cancel {
            padding: 8px 20px;
            border-radius: 10px;
            border: 1.5px solid var(--red-light);
            background: white;
            color: var(--red);
            font-weight: 700;
            cursor: pointer;
        }

        .btn-cancel:hover {
            background: var(--red);
            color: white;
        }

        .btn-complete {
            padding: 8px 20px;
            border-radius: 10px;
            border: none;
            background: var(--blue-mid);
            color: var(--blue);
            font-weight: 700;
            cursor: pointer;
        }

        .btn-complete:hover {
            background: var(--blue);
            color: white;
        }

        .empty-state {
            text-align: center;
            padding: 60px;
            color: var(--text-light);
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .main {
                margin-left: 0;
                padding: 16px;
            }

            .hamburger {
                display: flex;
            }

            .brand {
                min-width: unset;
            }
        }
    </style>
</head>

<body>

    <div id="toast"></div>
    <div id="navOverlay" onclick="toggleSidebar()"></div>

    <nav class="topnav">
        <button class="hamburger nav-btn" onclick="toggleSidebar()"><svg width="18" height="18" fill="none"
                stroke="currentColor" stroke-width="2.5">
                <line x1="2" y1="5" x2="16" y2="5" />
                <line x1="2" y1="9" x2="16" y2="9" />
                <line x1="2" y1="13" x2="16" y2="13" />
            </svg></button>
        <div class="brand">
            <div class="brand-logo"><svg width="20" height="20" viewBox="0 0 28 28" fill="none">
                    <path d="M7 9l7-5 7 5v10l-7 5-7-5V9z" fill="white" opacity="0.9" />
                </svg></div><span class="brand-name">SkillSwap PH</span>
        </div>
        <div class="nav-actions"><a href="dashboard.html" class="nav-btn"><svg width="17" height="17" fill="none"
                    stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <rect x="3" y="3" width="7" height="7" />
                    <rect x="14" y="3" width="7" height="7" />
                    <rect x="14" y="14" width="7" height="7" />
                    <rect x="3" y="14" width="7" height="7" />
                </svg></a>
            <div class="avatar-btn" id="userAvatar">JD</div>
        </div>
    </nav>

    <div class="layout">
        <aside class="sidebar" id="sidebar">
            <p class="sidebar-label">Navigation</p>
            <a href="dashboard.html" class="nav-link"><svg width="16" height="16" fill="none" stroke="currentColor"
                    stroke-width="2" viewBox="0 0 24 24">
                    <rect x="3" y="3" width="7" height="7" />
                    <rect x="14" y="3" width="7" height="7" />
                    <rect x="14" y="14" width="7" height="7" />
                    <rect x="3" y="14" width="7" height="7" />
                </svg>Dashboard</a>
            <a href="skills.html" class="nav-link"><svg width="16" height="16" fill="none" stroke="currentColor"
                    stroke-width="2" viewBox="0 0 24 24">
                    <path
                        d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" />
                </svg>My Skills</a>
            <a href="matches.html" class="nav-link"><svg width="16" height="16" fill="none" stroke="currentColor"
                    stroke-width="2" viewBox="0 0 24 24">
                    <circle cx="9" cy="7" r="4" />
                    <path d="M3 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2" />
                    <path d="M16 3.13a4 4 0 0 1 0 7.75" />
                    <path d="M21 21v-2a4 4 0 0 0-3-3.85" />
                </svg>Matches</a>
            <a href="exchanges.html" class="nav-link active"><svg width="16" height="16" fill="none"
                    stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path
                        d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3" />
                </svg>Exchanges</a>
            <a href="messages.html" class="nav-link"><svg width="16" height="16" fill="none" stroke="currentColor"
                    stroke-width="2" viewBox="0 0 24 24">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
                </svg>Messages</a>
            <a href="profile.html" class="nav-link"><svg width="16" height="16" fill="none" stroke="currentColor"
                    stroke-width="2" viewBox="0 0 24 24">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                    <circle cx="12" cy="7" r="4" />
                </svg>Profile</a>
            <div class="logout-btn"><button class="btn-logout" onclick="SkillSwap.logout()"><svg width="14" height="14"
                        fill="none" stroke="currentColor" stroke-width="2.5">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                        <polyline points="16 17 21 12 16 7" />
                        <line x1="21" y1="12" x2="9" y2="12" />
                    </svg>Log Out</button></div>
        </aside>

        <main class="main">
            <div class="page-header">
                <div>
                    <h1 class="page-title">🤝 Skill Exchanges</h1>
                    <p class="page-sub">Track and manage your exchange requests</p>
                </div>
            </div>
            <div class="exchanges-list" id="exchangesList"></div>
        </main>
    </div>

    <script>
        let exchanges = [...SkillSwap.exchanges];

        function getStatusClass(status) {
            if (status === 'pending') return 'status-pending';
            if (status === 'accepted') return 'status-accepted';
            return 'status-completed';
        }

        function renderExchanges() {
            const container = document.getElementById('exchangesList');
            if (!exchanges.length) {
                container.innerHTML = '<div class="empty-state">📭 No exchanges yet. Go to Matches to send requests!</div>';
                return;
            }
            container.innerHTML = exchanges.map((e, i) => `
      <div class="exchange-card" style="animation-delay:${i * 0.05}s">
        <div class="exchange-header">
          <div class="exchange-avatar">${e.initials}</div>
          <div class="exchange-info"><div class="exchange-name">${e.with_user}</div><div class="exchange-skill">${e.skill}</div><div class="exchange-date">📅 ${e.date} • ⏰ ${e.time}</div></div>
          <div><span class="status-badge ${getStatusClass(e.status)}">${e.status.toUpperCase()}</span><span class="mode-badge ml-2">${e.mode}</span></div>
        </div>
        ${e.status === 'pending' ? `<div class="exchange-actions"><button class="btn-accept" onclick="updateStatus(${e.id}, 'accepted')">✓ Accept</button><button class="btn-cancel" onclick="updateStatus(${e.id}, 'cancelled')">✗ Cancel</button></div>` : ''}
        ${e.status === 'accepted' ? `<div class="exchange-actions"><button class="btn-complete" onclick="updateStatus(${e.id}, 'completed')">✓ Mark Complete</button><button class="btn-cancel" onclick="updateStatus(${e.id}, 'cancelled')">✗ Cancel</button></div>` : ''}
      </div>
    `).join('');
        }

        function updateStatus(exchangeId, newStatus) {
            const exchange = exchanges.find(e => e.id === exchangeId);
            if (exchange) {
                exchange.status = newStatus;
                renderExchanges();
                SkillSwap.showToast(`✅ Exchange ${newStatus}!`);
            }
        }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('navOverlay').classList.toggle('show'); }
        document.addEventListener('DOMContentLoaded', () => { if (!localStorage.getItem('jwt_token')) { window.location.href = 'index.html'; return; } renderExchanges(); });
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('service-worker.js');
    </script>
</body>

</html>
